name: Update nowshowing.json

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm init -y
      - run: npm install @notionhq/client@2

      - name: Build JSON
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/build-nowshowing.js

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add nowshowing.json
          git diff --staged --quiet || git commit -m "update nowshowing.json"
          git push
