name: Update nowshowing.json

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm init -y
      - run: npm install @notionhq/client@2

      - name: Build JSON
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: node scripts/build-nowshowing.js

       - name: Create Pull Request
  uses: peter-evans/create-pull-request@v6
  with:
    commit-message: "update nowshowing.json"
    title: "Update nowshowing.json"
    body: "Automated update from Notion."
    branch: "bot/update-nowshowing"
    delete-branch: true
